<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venda de Ingressos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow">
    <div class="card-header bg-primary text-white">
      <h4>Cadastro de Venda de Ingresso</h4>
    </div>

    <div class="card-body">
      <form>
        <!-- Dados do comprador -->
        <div class="mb-3">
          <label class="form-label">Nome completo</label>
          <input type="text" class="form-control" placeholder="Digite seu nome">
        </div>

        <div class="mb-3">
          <label class="form-label">E-mail</label>
          <input type="email" class="form-control" placeholder="Digite seu e-mail">
        </div>

        <div class="mb-3">
          <label class="form-label">Telefone</label>
          <input type="tel" class="form-control" placeholder="(00) 00000-0000">
        </div>

        <!-- Cor da camiseta -->
        <div class="mb-3">
          <label class="form-label">Escolha a cor da camiseta</label>
          <input type="color" class="form-control form-control-color">
        </div>

        <!-- Setor -->
        <div class="mb-3">
          <label class="form-label">Setor da arquibancada</label>
          <select class="form-select">
            <option selected>Selecione...</option>
            <option>Pista</option>
            <option>VIP</option>
            <option>Camarote</option>
          </select>
        </div>

        <!-- Upload de foto -->
        <div class="mb-3">
          <label class="form-label">Foto para crachá</label>
          <input type="file" class="form-control">
        </div>

        <!-- Botões -->
        <button type="submit" class="btn btn-success">Salvar</button>
        <button type="reset" class="btn btn-secondary">Limpar</button>

      </form>
    </div>
  </div>
</div>

</body>
</html>
